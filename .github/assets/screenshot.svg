<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="960" viewBox="0 0 1440 960" role="img" aria-labelledby="title desc">
  <title id="title">HDB Planner app screenshot</title>
  <desc id="desc">A static capture-style view of the BTO Radar screen with filters, project cards, and policy data notes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop stop-color="#f4fafb"/>
      <stop offset=".35" stop-color="#eff7f8"/>
      <stop offset="1" stop-color="#f7fafb"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0f2c33" flood-opacity=".08"/>
    </filter>
  </defs>
  <rect width="1440" height="960" fill="url(#bg)"/>
  <circle cx="174" cy="28" r="264" fill="#54d6c6" opacity=".14"/>

  <g font-family="'Plus Jakarta Sans', Inter, 'Segoe UI', system-ui, sans-serif">
    <rect width="1440" height="64" fill="#fbfefe" opacity=".94"/>
    <path d="M0 64h1440" stroke="#dce8eb"/>
    <g transform="translate(32 16)">
      <rect width="32" height="32" rx="8" fill="#ffffff" stroke="#d2e0e3"/>
      <path d="M9 25V14.5L16 9l7 5.5V25h-5v-7h-4v7z" fill="#173f44"/>
      <path d="M7 16 16 8l9 8" fill="none" stroke="#173f44" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M9 26h16" stroke="#f1744e" stroke-width="2.4" stroke-linecap="round"/>
      <text x="44" y="23" fill="#10282e" font-size="16" font-weight="800">HDB Planner</text>
    </g>
    <g transform="translate(898 16)" font-size="14" font-weight="800">
      <rect width="94" height="32" rx="8" fill="#10282e"/>
      <text x="21" y="21" fill="#f4fafb">Overview</text>
      <rect x="104" width="122" height="32" rx="8" fill="transparent"/>
      <text x="123" y="21" fill="#647980">Purchase Plan</text>
      <rect x="236" width="90" height="32" rx="8" fill="#eef6f7"/>
      <text x="260" y="21" fill="#10282e">BTO Radar</text>
      <rect x="342" width="96" height="32" rx="8" fill="#eef4f5" stroke="#d7e2e5"/>
      <text x="366" y="21" fill="#10282e">Light</text>
    </g>

    <g transform="translate(112 112)">
      <text x="0" y="36" fill="#10282e" font-size="42" font-weight="850">BTO Radar</text>
      <text x="0" y="72" fill="#526a72" font-size="18" font-weight="650">Compare generated RecordBTO projects by launch year, town, and flat type.</text>

      <g transform="translate(0 116)" filter="url(#shadow)">
        <rect width="1224" height="112" rx="8" fill="#ffffff" stroke="#dce8eb"/>
        <g transform="translate(24 28)" font-size="14" font-weight="800">
          <text x="0" y="0" fill="#10282e">Launch year</text>
          <rect x="0" y="14" width="174" height="42" rx="8" fill="#ffffff" stroke="#b9ccd1"/>
          <text x="18" y="41" fill="#10282e">Latest</text>
          <text x="216" y="0" fill="#10282e">Town</text>
          <rect x="216" y="14" width="278" height="42" rx="8" fill="#ffffff" stroke="#b9ccd1"/>
          <text x="234" y="41" fill="#60777f">Search town or project</text>
          <text x="536" y="0" fill="#10282e">Flat type</text>
          <rect x="536" y="14" width="176" height="42" rx="8" fill="#ffffff" stroke="#b9ccd1"/>
          <text x="554" y="41" fill="#10282e">4-room</text>
          <rect x="742" y="14" width="112" height="42" rx="8" fill="#ffffff" stroke="#b9ccd1"/>
          <text x="770" y="41" fill="#10282e">Reset</text>
        </g>
      </g>

      <g transform="translate(0 268)" filter="url(#shadow)">
        <rect width="1224" height="494" rx="8" fill="#ffffff" stroke="#dce8eb"/>
        <g transform="translate(24 32)">
          <text x="0" y="0" fill="#10282e" font-size="26" font-weight="850">2026 projects for 4-room flats</text>
          <text x="0" y="32" fill="#526a72" font-size="15" font-weight="650">Showing projects with available flat-size data. Missing scrape fields stay visible instead of guessed.</text>

          <g transform="translate(0 72)" font-size="14">
            <rect width="360" height="158" rx="8" fill="#fbfefe" stroke="#dce8eb"/>
            <text x="18" y="32" fill="#10282e" font-size="19" font-weight="850">Kallang Whampoa Vista</text>
            <text x="18" y="58" fill="#526a72" font-weight="700">Kallang/Whampoa</text>
            <rect x="18" y="78" width="60" height="24" rx="4" fill="#fff1d2"/>
            <text x="31" y="95" fill="#6a3d12" font-size="12" font-weight="850">Prime</text>
            <text x="18" y="132" fill="#10282e" font-size="23" font-weight="850">$568k to $779k</text>

            <rect x="392" width="360" height="158" rx="8" fill="#fbfefe" stroke="#dce8eb"/>
            <text x="410" y="32" fill="#10282e" font-size="19" font-weight="850">Tampines GreenCrest</text>
            <text x="410" y="58" fill="#526a72" font-weight="700">Tampines</text>
            <rect x="410" y="78" width="82" height="24" rx="4" fill="#dff4ee"/>
            <text x="424" y="95" fill="#173f44" font-size="12" font-weight="850">Standard</text>
            <text x="410" y="132" fill="#10282e" font-size="23" font-weight="850">$405k to $565k</text>

            <rect x="784" width="360" height="158" rx="8" fill="#fbfefe" stroke="#dce8eb"/>
            <text x="802" y="32" fill="#10282e" font-size="19" font-weight="850">Queenstown Meadow</text>
            <text x="802" y="58" fill="#526a72" font-weight="700">Queenstown</text>
            <rect x="802" y="78" width="52" height="24" rx="4" fill="#e7eefc"/>
            <text x="817" y="95" fill="#263f78" font-size="12" font-weight="850">Plus</text>
            <text x="802" y="132" fill="#10282e" font-size="23" font-weight="850">$582k to $812k</text>
          </g>

          <g transform="translate(0 264)">
            <rect width="1144" height="102" rx="8" fill="#f2f7f8" stroke="#dce8eb"/>
            <text x="22" y="34" fill="#10282e" font-size="17" font-weight="850">Source handling</text>
            <text x="22" y="64" fill="#526a72" font-size="14" font-weight="650">BTO data is generated from RecordBTO. Policy constants live separately from generated project data.</text>
            <rect x="892" y="24" width="220" height="44" rx="8" fill="#10282e"/>
            <text x="935" y="52" fill="#ffffff" font-size="14" font-weight="850">Open selected plan</text>
          </g>
        </g>
      </g>
    </g>
  </g>
</svg>
