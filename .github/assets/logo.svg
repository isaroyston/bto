<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="320" viewBox="0 0 1120 320" role="img" aria-labelledby="title desc">
  <title id="title">HDB Planner</title>
  <desc id="desc">A dark GitHub banner for HDB Planner with a house mark and product tagline.</desc>
  <defs>
    <linearGradient id="mark" x1="124" x2="238" y1="82" y2="242" gradientUnits="userSpaceOnUse">
