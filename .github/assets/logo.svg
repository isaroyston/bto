  </defs>
  <rect width="1120" height="320" rx="34" fill="url(#bg)"/>
  <circle cx="938" cy="44" r="194" fill="#58d4c5" opacity=".08"/>
  <circle cx="92" cy="294" r="174" fill="#f1744e" opacity=".1"/>

  <g transform="translate(118 68)">
