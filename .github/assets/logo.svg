      <stop offset="1" stop-color="#1b5660"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#071114"/>
      <stop offset=".58" stop-color="#10282e"/>
      <stop offset="1" stop-color="#173f44"/>
