<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">HDB Planner showcase</title>
  <desc id="desc">A polished product preview showing HDB Planner affordability controls, BTO cards, and payment timing.</desc>
  <defs>
    <linearGradient id="shell" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#081316"/>
      <stop offset=".7" stop-color="#10282e"/>
      <stop offset="1" stop-color="#163f46"/>
    </linearGradient>
    <filter id="float" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity=".28"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#shell)"/>
  <circle cx="1072" cy="96" r="230" fill="#58d4c5" opacity=".08"/>
  <circle cx="104" cy="660" r="250" fill="#f1744e" opacity=".08"/>

  <g transform="translate(88 68)">
    <text x="0" y="62" fill="#f7fbfb" font-family="'Arial Rounded MT Bold', 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif" font-size="64" font-weight="900">HDB Planner</text>
    <text x="2" y="102" fill="#b9d1d5" font-family="'Plus Jakarta Sans', Inter, 'Segoe UI', system-ui, sans-serif" font-size="21" font-weight="700">Plan grants, payments, and BTO tradeoffs without turning the tab into a spreadsheet.</text>
  </g>

  <g transform="translate(88 166)" filter="url(#float)">
    <rect width="1104" height="472" rx="18" fill="#f7fbfb"/>
    <rect y="0" width="1104" height="54" rx="18" fill="#ffffff"/>
    <path d="M0 54h1104" stroke="#d8e5e7"/>
    <g transform="translate(24 15)">
      <rect width="24" height="24" rx="6" fill="#ffffff" stroke="#d3e2e5"/>
      <path d="M7 19V10.5L12 7l5 3.5V19h-4v-5h-2v5z" fill="#173f44"/>
      <path d="M5 12 12 6l7 6" fill="none" stroke="#173f44" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M7 20h12" stroke="#f1744e" stroke-width="1.8" stroke-linecap="round"/>
      <text x="36" y="18" fill="#10282e" font-family="'Plus Jakarta Sans', Inter, 'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="850">HDB Planner</text>
    </g>

    <g transform="translate(48 96)" font-family="'Plus Jakarta Sans', Inter, 'Segoe UI', system-ui, sans-serif">
      <text x="0" y="0" fill="#10282e" font-size="30" font-weight="850">BTO Radar</text>
      <text x="0" y="32" fill="#526a72" font-size="15" font-weight="700">Compare generated RecordBTO projects by launch year, town, and flat type.</text>

      <g transform="translate(0 66)">
        <rect width="310" height="250" rx="10" fill="#ffffff" stroke="#d8e5e7"/>
        <text x="22" y="36" fill="#10282e" font-size="18" font-weight="850">Assumptions</text>
        <text x="22" y="76" fill="#10282e" font-size="13" font-weight="800">Combined monthly income</text>
        <rect x="22" y="92" width="240" height="9" rx="5" fill="#dbe7ea"/>
        <rect x="22" y="92" width="142" height="9" rx="5" fill="#2d978c"/>
        <circle cx="164" cy="96.5" r="13" fill="#2d978c" stroke="#fff" stroke-width="4"/>
        <text x="22" y="138" fill="#10282e" font-size="13" font-weight="800">Flat price</text>
        <rect x="22" y="154" width="240" height="9" rx="5" fill="#dbe7ea"/>
        <rect x="22" y="154" width="184" height="9" rx="5" fill="#f1744e"/>
        <circle cx="206" cy="158.5" r="13" fill="#f1744e" stroke="#fff" stroke-width="4"/>
        <rect x="22" y="194" width="240" height="36" rx="8" fill="#10282e"/>
        <text x="42" y="217" fill="#ffffff" font-size="14" font-weight="850">$360,000 loan estimate</text>
      </g>

      <g transform="translate(346 66)">
        <rect width="566" height="250" rx="10" fill="#ffffff" stroke="#d8e5e7"/>
        <text x="22" y="36" fill="#10282e" font-size="18" font-weight="850">Latest 4-room matches</text>
        <g transform="translate(22 62)">
          <rect width="246" height="108" rx="9" fill="#fbfefe" stroke="#d8e5e7"/>
          <text x="16" y="30" fill="#10282e" font-size="16" font-weight="850">Queenstown Meadow</text>
          <text x="16" y="55" fill="#526a72" font-size="13" font-weight="700">4-room from $582k</text>
          <rect x="16" y="72" width="52" height="22" rx="5" fill="#e4ecff"/>
          <text x="29" y="87" fill="#243e78" font-size="11" font-weight="850">Plus</text>
        </g>
        <g transform="translate(290 62)">
          <rect width="246" height="108" rx="9" fill="#fbfefe" stroke="#d8e5e7"/>
          <text x="16" y="30" fill="#10282e" font-size="16" font-weight="850">Tampines Green</text>
          <text x="16" y="55" fill="#526a72" font-size="13" font-weight="700">4-room from $420k</text>
          <rect x="16" y="72" width="82" height="22" rx="5" fill="#dff4ee"/>
          <text x="28" y="87" fill="#173f44" font-size="11" font-weight="850">Standard</text>
        </g>
        <rect x="22" y="190" width="514" height="34" rx="8" fill="#eef6f7"/>
        <text x="42" y="212" fill="#526a72" font-size="13" font-weight="750">Generated data stays separate from policy constants.</text>
      </g>
    </g>
  </g>

  <g transform="translate(88 664)" font-family="'Plus Jakarta Sans', Inter, 'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="850">
    <rect width="168" height="34" rx="17" fill="#dff8f4"/>
    <text x="28" y="23" fill="#12363c">React + TypeScript</text>
    <rect x="184" width="154" height="34" rx="17" fill="#fff0d7"/>
    <text x="212" y="23" fill="#61380f">RecordBTO data</text>
    <rect x="354" width="132" height="34" rx="17" fill="#e4ecff"/>
    <text x="382" y="23" fill="#243e78">local plans</text>
  </g>
</svg>
